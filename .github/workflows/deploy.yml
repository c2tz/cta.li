name: Deploy to GitHub Pages

on:
  push:
    branches:
      - test-npm  # Change this to your main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 21

    - name: Install dependencies
      run: npm install

    - name: Minify HTML and CSS
      run: npx html-minifier-terser --input-dir . --output-dir . --collapse-whitespace --remove-comments --remove-optional-tags --remove-redundant-attributes --remove-script-type-attributes --remove-tag-whitespace --use-short-doctype --minify-css true --minify-js true

#   - name: Verify HTML
#     run: java -jar node_modules/vnu-jar/build/dist/vnu.jar --errors index.html

    - name: Verify CSS
      run: npx stylelint --fix main.css
