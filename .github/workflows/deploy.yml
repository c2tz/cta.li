name: Deploy to GitHub Pages

on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 21

      - name: Install dependencies
        run: npm install

      - name: Beautify HTML and CSS # use it on dev branch only
        run: npx prettier . --write

      - name: Verify CSS and correct
        run: npx stylelint --fix main.css

      #    - name: Verify HTML
